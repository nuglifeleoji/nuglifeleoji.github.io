baseURL = "https://nuglifeleoji.github.io/"
languageCode = "en-us"
title = "Leo's Hotpot"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  title = "Leo's Hotpot"
  description = "Math & CS @ Stanford · Interested in Test-Time Learning Systems and Multi-Agent Systems"
  keywords = ["AI", "ML", "Research", "Blog"]
  author = "Changxiu Ji"
  defaultTheme = "dark"
  ShowShareButtons = false
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.profileMode]
    enabled = true
    title = "Changxiu Ji"
    subtitle = "Math & CS @ Stanford · Interested in Test-Time Learning Systems and Multi-Agent Systems"
    imageUrl = ""
    imageWidth = 120
    imageHeight = 120
    imageTitle = "Leo"

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts"

    [[params.profileMode.buttons]]
      name = "About"
      url = "/about"

  [params.homeInfoParams]
    Title = "Leo's Hotpot 🍲"
    Content = "Thoughts on AI, ML systems, and software engineering"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nuglifeleoji"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/leo-ji-766626282/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
