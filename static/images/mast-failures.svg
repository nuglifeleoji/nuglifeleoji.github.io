<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7dd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6bc2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e05555;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="400" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e0e0e0" text-anchor="middle">MAST: Multi-Agent Failure Distribution (1,600+ traces)</text>
  <text x="400" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#777" text-anchor="middle">NeurIPS 2025 Spotlight · Cohen's Kappa 0.88</text>

  <!-- Chart area: x=200, y=90, width=490, height=230 -->
  <!-- Scale: 37.17% maps to 490px → 1% = ~13.18px -->

  <!-- FC1 bar -->
  <text x="195" y="131" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e0e0e0" text-anchor="end">FC1: Specification &amp;</text>
  <text x="195" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e0e0e0" text-anchor="end">System Design</text>
  <rect x="200" y="120" width="490" height="36" rx="4" fill="url(#bar1)"/>
  <text x="700" y="143" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4a9eff" text-anchor="start" dx="8">37.17%</text>

  <!-- FC2 bar -->
  <text x="195" y="199" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e0e0e0" text-anchor="end">FC2: Inter-Agent</text>
  <text x="195" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e0e0e0" text-anchor="end">Misalignment</text>
  <!-- 31.41/37.17 * 490 = 414px -->
  <rect x="200" y="188" width="414" height="36" rx="4" fill="url(#bar2)"/>
  <text x="622" y="211" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffd43b" text-anchor="start" dx="8">31.41%</text>

  <!-- FC3 bar -->
  <text x="195" y="267" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e0e0e0" text-anchor="end">FC3: Task Verification</text>
  <text x="195" y="284" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#e0e0e0" text-anchor="end">&amp; Termination</text>
  <rect x="200" y="256" width="414" height="36" rx="4" fill="url(#bar3)"/>
  <text x="622" y="279" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ff6b6b" text-anchor="start" dx="8">31.41%</text>

  <!-- Annotation arrow pointing to FC3 bar -->
  <!-- Arrow tip at x~490, y~274 (mid-bar), label to the right -->
  <line x1="490" y1="310" x2="490" y2="296" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/>
    </marker>
  </defs>
  <text x="490" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ff6b6b" text-anchor="middle">← the verifier bottleneck</text>

  <!-- X-axis baseline -->
  <line x1="200" y1="305" x2="700" y2="305" stroke="#333" stroke-width="1"/>

  <!-- X-axis ticks / scale labels -->
  <text x="200" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">0%</text>
  <text x="332" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">10%</text>
  <text x="464" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">20%</text>
  <text x="596" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">30%</text>
  <text x="700" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">37%</text>

  <!-- Tick marks -->
  <line x1="332" y1="302" x2="332" y2="308" stroke="#333" stroke-width="1"/>
  <line x1="464" y1="302" x2="464" y2="308" stroke="#333" stroke-width="1"/>
  <line x1="596" y1="302" x2="596" y2="308" stroke="#333" stroke-width="1"/>

  <!-- Footer note -->
  <text x="400" y="375" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">FC3 includes FM-3.1 Premature Termination (13.61%) and FM-3.2 Incomplete Verification</text>
</svg>
