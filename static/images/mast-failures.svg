<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="600" fill="#1a1a1a">MAST Failure Distribution</text>
  <!-- Subtitle -->
  <text x="40" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#888">1,600+ annotated traces · NeurIPS 2025 · Cohen's Kappa 0.88</text>

  <!-- Bar 1: Specification & Design (FC1) y=140 -->
  <text x="280" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#444" text-anchor="end">Specification &amp; Design</text>
  <rect x="300" y="126" width="141" height="28" fill="#4472c4"/>
  <text x="451" y="145" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#4472c4" dominant-baseline="middle">37.17%</text>

  <!-- Bar 2: Inter-Agent Misalignment (FC2) y=210 -->
  <text x="280" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#444" text-anchor="end">Inter-Agent Misalignment</text>
  <rect x="300" y="196" width="119" height="28" fill="#888888"/>
  <text x="429" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#888888" dominant-baseline="middle">31.41%</text>

  <!-- Bar 3: Task Verification (FC3) y=280 -->
  <text x="280" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#444" text-anchor="end">Task Verification</text>
  <rect x="300" y="266" width="119" height="28" fill="#c0392b"/>
  <text x="429" y="285" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#c0392b" dominant-baseline="middle">31.41%</text>

  <!-- Annotation: verifier bottleneck -->
  <line x1="419" y1="306" x2="540" y2="320" stroke="#c0392b" stroke-width="1"/>
  <text x="545" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#c0392b">the verifier bottleneck</text>

  <!-- Source -->
  <text x="760" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">Source: arXiv:2503.13657</text>
</svg>
