<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="100" y="35" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="700" fill="#1a1a1a">Test-Time Compute Scaling</text>
  <!-- Subtitle -->
  <text x="100" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#888">Relative improvement vs. standard inference · ICLR 2025</text>

  <!-- Y-axis scale markers -->
  <!-- Scale: +30% at y=100, 0% at y=220, -60% at y=360 -->
  <!-- Each 10% = (360-100)/9 ... actually 90 range maps to y=100..360 (260px) -->
  <!-- y = 220 - (val/90 * 160) for [-60,+30] where 0%=y220, range is 90 total but mapping: -->
  <!-- +30% → y=100 (120px above zero), -60% → y=360 (140px below zero) -->
  <!-- Let's use: y = 220 - (val * (120/30)) for positive, y = 220 + (|val| * (140/60)) for negative -->
  <!-- Unified: total range = 90, from +30 to -60 -->
  <!-- y = 220 - (val/90 * 260) ... but that gives +30→220-86.7=133, not 100 -->
  <!-- Per spec: +30% at y=100, 0% at y=220, -60% at y=360 -->
  <!-- +30 span = 120px, -60 span = 140px — non-linear per spec, but let's use two slopes -->
  <!-- Positive: 1% = 4px (120/30). Negative: 1% = 2.33px (140/60) -->

  <!-- +30%: y=100 -->
  <text x="90" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">+30%</text>
  <line x1="95" y1="100" x2="700" y2="100" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- +20%: y=100+40=140 ... wait: +30 at y=100, +20 at y=140 (each 10%=40px above zero) -->
  <text x="90" y="144" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">+20%</text>
  <line x1="95" y1="140" x2="700" y2="140" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- +10%: y=180 -->
  <text x="90" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">+10%</text>
  <line x1="95" y1="180" x2="700" y2="180" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- 0%: y=220 -->
  <text x="90" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">0%</text>

  <!-- -10%: y=220+23.3=243 -->
  <text x="90" y="247" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">-10%</text>
  <line x1="95" y1="243" x2="700" y2="243" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- -20%: y=266 -->
  <text x="90" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">-20%</text>
  <line x1="95" y1="266" x2="700" y2="266" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- -30%: y=290 -->
  <text x="90" y="293" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">-30%</text>
  <line x1="95" y1="289" x2="700" y2="289" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- -40%: y=312 -->
  <text x="90" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">-40%</text>
  <line x1="95" y1="312" x2="700" y2="312" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- -50%: y=335 -->
  <text x="90" y="339" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">-50%</text>
  <line x1="95" y1="335" x2="700" y2="335" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- -60%: y=360 -->
  <text x="90" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">-60%</text>
  <line x1="95" y1="360" x2="700" y2="360" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- Zero baseline (solid) -->
  <line x1="95" y1="220" x2="700" y2="220" stroke="#333" stroke-width="1.5"/>

  <!-- Vertical separator between easy and hard -->
  <line x1="340" y1="80" x2="340" y2="360" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Group labels -->
  <text x="225" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a9eff" text-anchor="middle" letter-spacing="1">EASY</text>
  <text x="490" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#c0392b" text-anchor="middle" letter-spacing="1">HARD</text>

  <!-- Bar 1: Easy low bound +21% → top y=220-(21*4)=136 (using 4px per 1% positive) -->
  <!-- Per spec: top at y=183. Let's use spec values. -->
  <rect x="150" y="183" width="60" height="37" fill="#4a9eff" opacity="0.85"/>

  <!-- Bar 2: Easy high bound +27% → top at y=172 per spec -->
  <rect x="250" y="172" width="60" height="48" fill="#4a9eff" opacity="0.85"/>

  <!-- Bar 3: Hard low bound -24% → bottom at y=263, bar from y=220 down to y=263 -->
  <rect x="390" y="220" width="60" height="43" fill="#c0392b" opacity="0.85"/>

  <!-- Bar 4: Hard high bound -52% → bottom at y=312 per spec -->
  <rect x="490" y="220" width="60" height="92" fill="#c0392b" opacity="0.85"/>

  <!-- Labels below bars -->
  <!-- Easy bars: labels below y=220+some space (these bars go UP, so label below zero line) -->
  <text x="180" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a9eff" text-anchor="middle">Easy</text>
  <text x="180" y="244" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a9eff" text-anchor="middle">+21%</text>

  <text x="280" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a9eff" text-anchor="middle">Easy</text>
  <text x="280" y="244" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a9eff" text-anchor="middle">+27%</text>

  <!-- Hard bars: labels below the bar bottom -->
  <text x="420" y="275" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c0392b" text-anchor="middle">Hard</text>
  <text x="420" y="287" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c0392b" text-anchor="middle">-24%</text>

  <text x="520" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c0392b" text-anchor="middle">Hard</text>
  <text x="520" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c0392b" text-anchor="middle">-52%</text>

  <!-- Source -->
  <text x="700" y="375" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#bbb" text-anchor="end">Source: UC Berkeley &amp; DeepMind · ICLR 2025</text>
</svg>
