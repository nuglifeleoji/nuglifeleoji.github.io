<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Generator boxes (left side) — multiple agent outputs -->
  <g opacity="0.85">
    <!-- Agent 1 -->
    <rect x="60" y="100" width="120" height="44" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="120" y="127" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle">Generator A</text>
    <!-- Agent 2 -->
    <rect x="60" y="165" width="120" height="44" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="120" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle">Generator B</text>
    <!-- Agent 3 -->
    <rect x="60" y="230" width="120" height="44" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="120" y="257" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle">Generator C</text>
    <!-- Agent 4 -->
    <rect x="60" y="295" width="120" height="44" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="120" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle">Generator D</text>
    <!-- Agent 5 -->
    <rect x="60" y="360" width="120" height="44" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="120" y="387" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle">Generator E</text>
    <!-- Agent 6 -->
    <rect x="60" y="425" width="120" height="44" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="120" y="452" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle">Generator F</text>
  </g>

  <!-- Lines from generators to funnel -->
  <line x1="180" y1="122" x2="320" y2="240" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="180" y1="187" x2="320" y2="268" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="180" y1="252" x2="320" y2="290" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="180" y1="317" x2="320" y2="315" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="180" y1="382" x2="320" y2="338" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="180" y1="447" x2="320" y2="390" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Funnel shape -->
  <polygon points="320,200 480,265 480,365 320,430" fill="url(#funnelGrad)" stroke="#4a9eff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Bottleneck — narrow verifier -->
  <rect x="480" y="285" width="90" height="60" rx="8" fill="#1a1a1a" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="525" y="311" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">LLM</text>
  <text x="525" y="328" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">Verifier</text>

  <!-- Failures dripping out below funnel -->
  <text x="395" y="500" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="middle" opacity="0.7">✗ fail</text>
  <text x="350" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="middle" opacity="0.5">✗ fail</text>
  <text x="440" y="525" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#ff6b6b" text-anchor="middle" opacity="0.6">✗ fail</text>
  <line x1="395" y1="470" x2="390" y2="488" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="370" y1="475" x2="350" y2="516" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="420" y1="473" x2="440" y2="511" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Output arrow -->
  <line x1="570" y1="315" x2="650" y2="315" stroke="#51cf66" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#51cf66"/>
    </marker>
  </defs>
  <!-- Output box (small — only a few pass) -->
  <rect x="650" y="295" width="90" height="40" rx="6" fill="none" stroke="#51cf66" stroke-width="1.5"/>
  <text x="695" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#51cf66" text-anchor="middle">Output</text>

  <!-- Main title -->
  <text x="600" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" fill="#e0e0e0" text-anchor="middle" filter="url(#glow)">The Verifier Bottleneck</text>

  <!-- Subtitle -->
  <text x="600" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#a0a0a0" text-anchor="middle">Why scaling generators without fixing verifiers leads to parallel hallucination</text>

  <!-- Divider line -->
  <line x1="200" y1="162" x2="1000" y2="162" stroke="#333" stroke-width="1"/>

  <!-- Right-side annotation label -->
  <text x="780" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">Narrow verifier = correlated failure</text>
  <text x="780" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#ff6b6b" text-anchor="middle">Same model family → same blind spots</text>
  <text x="780" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">More generators ≠ better verification</text>
  <text x="780" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#4a9eff" text-anchor="middle">= parallel hallucination</text>
</svg>
