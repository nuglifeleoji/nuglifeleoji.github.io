<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#fafaf8"/>

  <!-- Tag line -->
  <text x="80" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#999" letter-spacing="2" font-variant="small-caps">RESEARCH NOTE · MARCH 2026</text>

  <!-- Thin rule -->
  <line x1="80" y1="208" x2="560" y2="208" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Main title -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700" fill="#1a1a1a">The Verifier</text>
  <text x="80" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700" fill="#1a1a1a">Bottleneck</text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#666">Multi-agent systems fail not because generators are weak —</text>
  <text x="80" y="470" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#666">but because verifiers are broken.</text>

  <!-- Bottom left attribution -->
  <text x="80" y="600" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#aaa">nuglifeleoji.github.io</text>

  <!-- Right half: Abstract funnel diagram -->
  <!-- Multiple generator lines converging from right toward center verifier -->
  <!-- Lines come from right side and converge left toward verifier gap -->

  <!-- Generator input lines (top group) -->
  <line x1="750" y1="180" x2="960" y2="240" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="200" x2="960" y2="248" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="220" x2="960" y2="256" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="240" x2="960" y2="264" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="260" x2="960" y2="270" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="280" x2="960" y2="276" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="300" x2="960" y2="282" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="320" x2="960" y2="288" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="340" x2="960" y2="296" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="360" x2="960" y2="304" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="380" x2="960" y2="312" stroke="#c8c8c8" stroke-width="1.5"/>
  <line x1="750" y1="400" x2="960" y2="320" stroke="#c8c8c8" stroke-width="1.5"/>

  <!-- Verifier narrow gap: thin vertical rectangle -->
  <rect x="955" y="235" width="10" height="92" rx="2" fill="#e05050"/>

  <!-- Single output line -->
  <line x1="965" y1="281" x2="1140" y2="281" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Arrow head -->
  <polygon points="1135,275 1148,281 1135,287" fill="#1a1a1a"/>
</svg>
