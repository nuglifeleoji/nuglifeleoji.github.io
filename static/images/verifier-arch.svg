<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#51cf66"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="400" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700" fill="#e0e0e0" text-anchor="middle">Verifier Architecture: Current vs Better</text>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="380" stroke="#2a2a2a" stroke-width="2"/>

  <!-- ===== LEFT SIDE: Current — broken ===== -->
  <text x="200" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ff6b6b" text-anchor="middle">Current — broken</text>

  <!-- Agent boxes (left) -->
  <rect x="30" y="95" width="90" height="32" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="75" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4a9eff" text-anchor="middle">Agent 1</text>

  <rect x="30" y="145" width="90" height="32" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="75" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4a9eff" text-anchor="middle">Agent 2</text>

  <rect x="30" y="195" width="90" height="32" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="75" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4a9eff" text-anchor="middle">Agent 3</text>

  <!-- Arrows from agents to verifier -->
  <line x1="120" y1="111" x2="185" y2="165" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="120" y1="161" x2="185" y2="174" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <line x1="120" y1="211" x2="185" y2="183" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>

  <!-- Single LLM Verifier — narrow, red -->
  <rect x="185" y="148" width="80" height="56" rx="6" fill="#2a0f0f" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="225" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">Single</text>
  <text x="225" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">LLM</text>
  <text x="225" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="600">Verifier</text>

  <!-- Correlated failure label -->
  <rect x="175" y="218" width="100" height="28" rx="4" fill="#330000"/>
  <text x="225" y="234" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#ff6b6b" text-anchor="middle">correlated failure</text>

  <!-- Arrow to output -->
  <line x1="265" y1="176" x2="320" y2="176" stroke="#888" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Output box -->
  <rect x="320" y="160" width="62" height="32" rx="5" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="351" y="180" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#777" text-anchor="middle">Output</text>

  <!-- ===== RIGHT SIDE: Better ===== -->
  <text x="600" y="72" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#51cf66" text-anchor="middle">Better</text>

  <!-- Agent boxes (right) -->
  <rect x="420" y="95" width="90" height="32" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="465" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4a9eff" text-anchor="middle">Agent 1</text>

  <rect x="420" y="145" width="90" height="32" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="465" y="166" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4a9eff" text-anchor="middle">Agent 2</text>

  <rect x="420" y="195" width="90" height="32" rx="5" fill="none" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="465" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#4a9eff" text-anchor="middle">Agent 3</text>

  <!-- Arrows from agents to verifier -->
  <line x1="510" y1="111" x2="565" y2="155" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arrowGreen)"/>
  <line x1="510" y1="161" x2="565" y2="170" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arrowGreen)"/>
  <line x1="510" y1="211" x2="565" y2="188" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arrowGreen)"/>

  <!-- Independent Verifier — wider, green -->
  <rect x="565" y="138" width="105" height="78" rx="6" fill="#0d1f0d" stroke="#51cf66" stroke-width="2.5"/>
  <text x="617" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#51cf66" text-anchor="middle" font-weight="600">Independent</text>
  <text x="617" y="177" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#51cf66" text-anchor="middle" font-weight="600">Verifier</text>
  <text x="617" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#51cf66" text-anchor="middle" opacity="0.8">─────────</text>
  <text x="617" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#51cf66" text-anchor="middle">symbolic + diverse</text>

  <!-- Label -->
  <rect x="558" y="228" width="120" height="28" rx="4" fill="#0a2a0a"/>
  <text x="618" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#51cf66" text-anchor="middle">symbolic + diverse + human</text>

  <!-- Arrow to output -->
  <line x1="670" y1="177" x2="730" y2="177" stroke="#51cf66" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Output box -->
  <rect x="730" y="161" width="52" height="32" rx="5" fill="none" stroke="#51cf66" stroke-width="1.5"/>
  <text x="756" y="181" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#51cf66" text-anchor="middle">Output</text>

  <!-- Key insight box -->
  <rect x="60" y="290" width="680" height="68" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="400" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0e0e0" text-anchor="middle">Key Principle</text>
  <text x="400" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Verification should never be done by the same model family that did the generation.</text>
  <text x="400" y="352" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Same base model = correlated blind spots = undetectable errors.</text>
</svg>
