<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#ffffff"/>

  <!-- Dividing line -->
  <line x1="400" y1="60" x2="400" y2="320" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT COLUMN: CURRENT ===== -->
  <text x="60" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#888" letter-spacing="1">CURRENT</text>

  <!-- 3 Agent boxes -->
  <rect x="60" y="80" width="90" height="30" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <text x="105" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#555" text-anchor="middle">Agent</text>

  <rect x="60" y="130" width="90" height="30" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <text x="105" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#555" text-anchor="middle">Agent</text>

  <rect x="60" y="180" width="90" height="30" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <text x="105" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#555" text-anchor="middle">Agent</text>

  <!-- Converging arrows from agents to verifier -->
  <line x1="150" y1="95" x2="220" y2="142" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="150" y1="145" x2="220" y2="150" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="150" y1="195" x2="220" y2="158" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Single verifier box -->
  <rect x="220" y="130" width="110" height="40" rx="4" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="275" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#c0392b" text-anchor="middle">LLM Verifier</text>

  <!-- Note below verifier -->
  <text x="275" y="182" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#c0392b" text-anchor="middle" font-style="italic">same model family</text>

  <!-- Arrow from verifier to output -->
  <line x1="330" y1="150" x2="348" y2="150" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Output circle with ? -->
  <circle cx="370" cy="150" r="20" fill="#f5f5f5" stroke="#aaaaaa" stroke-width="1"/>
  <text x="370" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#999999" text-anchor="middle">?</text>

  <!-- Below diagram label -->
  <text x="210" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#c0392b" text-anchor="middle">Correlated failure —</text>
  <text x="210" y="274" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#c0392b" text-anchor="middle">verifier can't catch generator's blind spots</text>

  <!-- ===== RIGHT COLUMN: BETTER ===== -->
  <text x="420" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#888" letter-spacing="1">BETTER</text>

  <!-- 3 Agent boxes -->
  <rect x="430" y="80" width="90" height="30" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <text x="475" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#555" text-anchor="middle">Agent</text>

  <rect x="430" y="130" width="90" height="30" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <text x="475" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#555" text-anchor="middle">Agent</text>

  <rect x="430" y="180" width="90" height="30" rx="4" fill="#dddddd" stroke="#aaaaaa" stroke-width="1"/>
  <text x="475" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#555" text-anchor="middle">Agent</text>

  <!-- Lines from agents spreading to 3 verifiers -->
  <!-- Verifier 1: Unit Tests at x=580, y=90 -->
  <line x1="520" y1="95" x2="580" y2="102" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="520" y1="145" x2="580" y2="108" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="520" y1="195" x2="580" y2="114" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Verifier 2: Alt. Model at x=580, y=150 -->
  <line x1="520" y1="95" x2="580" y2="150" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="520" y1="145" x2="580" y2="154" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="520" y1="195" x2="580" y2="158" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Verifier 3: Human at x=580, y=200 -->
  <line x1="520" y1="95" x2="580" y2="196" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="520" y1="145" x2="580" y2="200" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="520" y1="195" x2="580" y2="204" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Verifier box 1: Unit Tests -->
  <rect x="580" y="90" width="80" height="24" rx="3" fill="#e8f4e8" stroke="#27ae60" stroke-width="1"/>
  <text x="620" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#27ae60" text-anchor="middle">Unit Tests</text>

  <!-- Verifier box 2: Alt. Model -->
  <rect x="580" y="140" width="80" height="24" rx="3" fill="#e8f0fc" stroke="#4472c4" stroke-width="1"/>
  <text x="620" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#4472c4" text-anchor="middle">Alt. Model</text>

  <!-- Verifier box 3: Human -->
  <rect x="580" y="190" width="80" height="24" rx="3" fill="#fff8e8" stroke="#e67e22" stroke-width="1"/>
  <text x="620" y="206" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#e67e22" text-anchor="middle">Human</text>

  <!-- Lines from verifiers to output circle -->
  <line x1="660" y1="102" x2="722" y2="148" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="660" y1="152" x2="724" y2="152" stroke="#bbbbbb" stroke-width="1"/>
  <line x1="660" y1="202" x2="722" y2="157" stroke="#bbbbbb" stroke-width="1"/>

  <!-- Output circle: checkmark -->
  <circle cx="745" cy="152" r="20" fill="#e8f4e8" stroke="#27ae60" stroke-width="1.5"/>
  <text x="745" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#27ae60" text-anchor="middle">&#10003;</text>

  <!-- Below diagram label -->
  <text x="595" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#27ae60" text-anchor="middle">Independent signals —</text>
  <text x="595" y="274" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#27ae60" text-anchor="middle">different failure modes</text>

  <!-- Bottom center label -->
  <text x="400" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="700" fill="#1a1a1a" text-anchor="middle">Independent verification is non-negotiable</text>
</svg>
